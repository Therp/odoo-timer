name: Firefox

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Firefox XPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build XPI
        id: web-ext-build
        uses: kewisch/action-web-ext@v1
        with:
          cmd: build
          source: dist/firefox
          filename: "therp-timer.xpi"
          ignoreFiles: '[ "package.json", "package-lock.json", "yarn.lock" ]'

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: therp-odoo-timer-firefox-unsigned
          path: ${{ steps.web-ext-build.outputs.target }}

  sign:
    name: Sign Firefox XPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build XPI for signing
        id: web-ext-build
        uses: kewisch/action-web-ext@v1
        with:
          cmd: build
          source: dist/firefox
          filename: "therp-timer.xpi"
          ignoreFiles: '[ "package.json", "package-lock.json", "yarn.lock" ]'

      - name: Sign XPI with AMO
        id: web-ext-sign
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: ${{ steps.web-ext-build.outputs.target }}
          channel: listed
          apiKey: ${{ secrets.AMO_JWT_ISSUER }}
          apiSecret: ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: therp-odoo-timer-firefox-signed
          path: ${{ steps.web-ext-sign.outputs.target }}