name: Chrome Package

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-chrome:
    name: Build Chrome ZIP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload Chrome extension files
        uses: actions/upload-artifact@v4
        with:
          name: therp-odoo-timer-chrome
          path: dist/chrome